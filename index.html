<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joyeux anniversaire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #f6d5a2, #f5a06b, #c07ac9, #3f9ea0);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: "🎂🎈🎉🎁🥳";
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            font-size: 50px;
            color: rgba(255,250,210,0.3);
            white-space: nowrap;
            pointer-events: none;
            transform: rotate(-8deg) scale(1.8);
            letter-spacing: 35px;
            text-shadow: 0 0 10px #ffffff88;
        }

        
        .phone {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 35, 45, 0.55);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 54px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 2px rgba(255, 255, 255, 0.4), 0 0 0 6px rgba(255, 245, 190, 0.35);
            overflow: hidden;
            border: 2px solid rgba(255, 249, 196, 0.5);
        }

        .display {
            background: rgba(18, 28, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            height: 760px;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 16px 10px 16px;
            background: rgba(45, 65, 80, 0.5);
            backdrop-filter: blur(18px);
            border-bottom: 2px solid rgba(255, 241, 164, 0.7);
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            box-shadow: 0 4px 0 rgba(200, 120, 30, 0.4);
        }

        .header-pic {
            width: 48px;
            height: 48px;
            background: rgba(255, 225, 140, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 22px;
            color: #3a281a;
            border: 3px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .header-text {
            flex: 1;
        }
        .header-text h3 {
            font-size: 20px;
            font-weight: 700;
            color: #fffacb;
            text-shadow: 0 2px 5px #b47d4e;
        }
        .header-text p {
            font-size: 13px;
            color: #ffeecb;
            font-weight: 500;
        }

        .tap-icon {
            background: rgba(255, 200, 100, 0.7);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 700;
            color: #2f2a1f;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.7);
        }
        .tap-icon:active {
            transform: scale(0.96);
            background: rgba(255, 180, 70, 0.8);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 14px 14px 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(18, 35, 45, 0.3);
            backdrop-filter: blur(6px);
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 220, 130, 0.9);
            border-radius: 10px;
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 100%;
            opacity: 0;
            transform: translateY(16px);
            animation: popIn 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
        }
        @keyframes popIn {
            to { opacity: 1; transform: translateY(0); }
        }

        
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3), 0 0 0 3px rgba(255,255,255,0.7);
            flex-shrink: 0;
            transition: 0.2s;
            border: 2px solid rgba(255, 255, 255, 0.9);
            
        }
        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(255,255,200,0.5);
        }

        
        .llm-name {
            font-size: 14px;
            font-weight: 700;
            margin-left: 6px;
            margin-bottom: 4px;
            color: #ffefc8;
            text-shadow: 2px 2px 3px #00000070;
        }

        
        .bubble {
            background: rgba(245, 245, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 14px 18px;
            border-radius: 28px 28px 28px 8px;
            color: #ffffff;
            font-size: 16px;
            line-height: 1.45;
            word-break: break-word;
            max-width: 270px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2), 0 0 0 2px rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.6);
            font-weight: 500;
            text-shadow: 0 1px 3px black;
        }

        .birthday-bubble .bubble {
            background: rgba(255, 225, 90, 0.4);
            backdrop-filter: blur(20px);
            border: 4px solid rgba(255, 215, 0, 0.8);
            color: #fff6d5;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            box-shadow: 0 15px 30px #ffbb33AA;
        }

        .chat-footer {
            background: rgba(40, 55, 70, 0.5);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            border-top: 3px solid rgba(255, 220, 100, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff7cf;
            font-size: 15px;
            font-weight: 600;
        }

        .progress-indicator {
            background: rgba(30, 60, 75, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 40px;
            border: 2px solid rgba(255, 220, 100, 0.9);
            color: #fff6bb;
        }

        .next-tap {
            background: rgba(255, 180, 60, 0.75);
            backdrop-filter: blur(10px);
            padding: 10px 26px;
            border-radius: 50px;
            color: #1e2b16;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 8px 0 rgba(150, 90, 10, 0.6);
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .next-tap:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 rgba(150, 90, 10, 0.6);
        }

        .hint-message {
            text-align: center;
            background: rgba(255, 215, 140, 0.3);
            backdrop-filter: blur(18px);
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            border: 2px dashed rgba(255, 255, 255, 0.8);
            color: #fffed0;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="display">
            <div class="chat-header">
                <div class="header-pic">🫧</div>
                <div class="header-text">
                    <h3> Channel </h3>
                    <p> №5 </p>
                </div>
                <div class="tap-icon" id="headerTapBtn">👆 ТЫК</div>
            </div>

            <div class="chat-area" id="chatArea">
                <div class="hint-message" id="startHint">
                    🫧 НАЖМИ «ДАЛЕЕ» <br>
                </div>
            </div>

            <div class="chat-footer">
                <span class="progress-indicator" id="stepCounter">0 / 7</span>
                <button class="next-tap" id="tapButton">🍰 ДАЛЕЕ</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            
            const llmList = [
                { name: 'ChatGPT', emoji: '🤖' },
                { name: 'Gemini', emoji: '✨' },
                { name: 'Claude', emoji: '🕴️' },
                { name: 'Perplexity', emoji: '🧠' },
                { name: 'Grok', emoji: '😎' }
            ];


            const photoPaths = [
                'llms/chatgpt.jpg',   
                'llms/gemini.jpg',    
                'llms/claude.jpg',    
                'llms/perplexity.jpg',
                'llms/grok.jpg'       
            ];
           
            const conversation = [
                { llmIdx: 0, text: 'Если бы ты была городом, то Парижем 🇫🇷' },
                { llmIdx: 1, text: 'Если бы ты была музеем, то Лувром 🖼️' },
                { llmIdx: 2, text: 'Если бы ты была рестораном, то с тремя звёздами Мишлен ⭐⭐⭐' },
                { llmIdx: 3, text: 'Если бы ты была комплектующим для компьютера, то ОЗУ 💾' },
                { llmIdx: 4, text: 'Если бы ты была актрисой, то точно получила бы Оскар 🏆' },
                { llmIdx: 1, text: 'Кажется, у кого-то праздник? 🎂' },
            ];

            const TOTAL_STEPS = conversation.length + 1; 
            let currentStep = 0;
            let hintElement = document.getElementById('startHint');

            const chatArea = document.getElementById('chatArea');
            const stepCounter = document.getElementById('stepCounter');
            const tapButton = document.getElementById('tapButton');
            const headerTapBtn = document.getElementById('headerTapBtn');

            
            function createAvatar(llmIdx) {
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'avatar';
              
                avatarDiv.style.backgroundImage = `url('${photoPaths[llmIdx]}')`;
                avatarDiv.style.backgroundSize = 'cover';
                avatarDiv.style.backgroundPosition = 'center';
                
                avatarDiv.setAttribute('data-llm', llmIdx);
                return avatarDiv;
            }

            
            function addMessage(llmIdx, customText) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message msg-llm${llmIdx}`;

                const avatarDiv = createAvatar(llmIdx);

                const wrapper = document.createElement('div');
                wrapper.className = 'bubble-wrapper';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'llm-name';
                nameSpan.textContent = llmList[llmIdx].name + ' ' + llmList[llmIdx].emoji;

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = customText;

                wrapper.appendChild(nameSpan);
                wrapper.appendChild(bubble);
                msgDiv.appendChild(avatarDiv);
                msgDiv.appendChild(wrapper);
                chatArea.appendChild(msgDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            
            function addFinalBirthday() {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message birthday-bubble`;
                
                const avatarDiv = createAvatar(0); 
                
                const wrapper = document.createElement('div');
                wrapper.className = 'bubble-wrapper';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'llm-name';
                nameSpan.textContent = 'ВСЕ-ВСЕ-ВСЕ';
                
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = '🥳 С ДНЁМ РОЖДЕНИЯ! 🎈';
                
                wrapper.appendChild(nameSpan);
                wrapper.appendChild(bubble);
                msgDiv.appendChild(avatarDiv);
                msgDiv.appendChild(wrapper);
                chatArea.appendChild(msgDiv);
                chatArea.scrollTop = chatArea.scrollHeight;
            }

            function updateCounter() {
                stepCounter.textContent = `${currentStep} / ${TOTAL_STEPS}`;
            }

            
            function handleTap() {
                if (hintElement && hintElement.parentNode) {
                    hintElement.remove();
                    hintElement = null;
                }

                if (currentStep < conversation.length) {
                    const msg = conversation[currentStep];
                    addMessage(msg.llmIdx, msg.text);
                    currentStep++;
                } else if (currentStep === conversation.length) {
                    addFinalBirthday();
                    currentStep++;
                } else {
                    return;
                }
                updateCounter();
                if (currentStep === TOTAL_STEPS) {
                    tapButton.textContent = '🎉 УРА';
                    headerTapBtn.textContent = '🎂';
                }
            }

            
            function initChat() {
                chatArea.innerHTML = '';
                const hint = document.createElement('div');
                hint.className = 'hint-message';
                hint.id = 'startHint';
                hint.innerHTML = '🫧 НАЖМИ «ДАЛЕЕ» <br>';
                chatArea.appendChild(hint);
                hintElement = hint;
                currentStep = 0;
                updateCounter();
                tapButton.textContent = '🍰 ДАЛЕЕ';
                headerTapBtn.textContent = '👆 ТЫК';
            }

            tapButton.onclick = () => handleTap();
            headerTapBtn.onclick = () => handleTap();

            initChat();

            
            const style = document.createElement('style');
            style.textContent = `
                .avatar {
                    background-color: rgba(200, 220, 240, 0.5); /* заливка, пока грузится фото */
                    background-blend-mode: normal;
                }
            `;
            document.head.appendChild(style);
        })();
    </script>
</body>
</html>
